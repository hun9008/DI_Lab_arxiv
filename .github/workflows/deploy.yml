name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}
          port: 22
          script_stop: true
          script: |
            set -e
            cd /home/hun/Desktop/DI_Lab_arxiv

            export NVM_DIR="$HOME/.nvm"
            if [ -s "$NVM_DIR/nvm.sh" ]; then
              . "$NVM_DIR/nvm.sh"
              nvm install
              nvm use
            else
              echo "nvm is not installed on the server. Install nvm and Node 22.x first."
              exit 1
            fi
            git pull origin main
            npm ci
            npm run build
            pm2 restart dilab-arxiv --update-env
